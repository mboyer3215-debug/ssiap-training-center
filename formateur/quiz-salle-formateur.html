<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz en Salle — Formateur · SSIAP Training</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#f7f4f0;--surface:#fff;--subtle:#f0ece7;
  --border:#e8e2db;--text:#1e1a17;--text2:#4a4340;--muted:#8c8078;
  --rouge:#c25a3a;--rouge-light:#fdf2ee;
  --green:#2e7d52;--green-light:#edf7f2;
  --orange:#e07b2a;--orange-light:#fff3e8;
  --gold:#d4960a;--gold-light:#fef7e0;
  --forest:#1a4a32;
  --shadow:0 4px 16px rgba(0,0,0,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}

.header{background:linear-gradient(135deg,var(--orange),#c4681e);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;box-shadow:0 3px 12px rgba(224,123,42,.3)}
.header-brand{font-family:'Lora',serif;font-size:17px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.pill{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.25);padding:4px 12px;border-radius:20px;font-size:12px;color:rgba(255,255,255,.9);font-weight:600}
.btn-back{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}

.phase{display:none}.phase.on{display:block}
.wrap{max-width:980px;margin:0 auto;padding:28px 20px}

/* CARDS */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-head h2{font-family:'Lora',serif;font-size:16px;font-weight:600;flex:1}
.card-body{padding:20px}

/* CONFIG TOGGLES */
.sec{margin-bottom:18px}
.sec-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:8px;display:block}
.tgl-g{display:flex;gap:6px;flex-wrap:wrap}
.tgl{padding:7px 14px;border-radius:8px;border:2px solid var(--border);background:var(--subtle);font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:.13s}
.tgl.on{border-color:var(--orange);background:var(--orange-light);color:var(--orange)}

/* CODE BANNER */
.code-banner{background:linear-gradient(135deg,var(--forest),#0c2118);border-radius:14px;padding:28px 20px;text-align:center;margin-bottom:16px}
.code-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.code-num{font-family:'Lora',serif;font-size:60px;font-weight:700;color:#fff;letter-spacing:14px;line-height:1}
.code-url-txt{font-size:11px;color:rgba(255,255,255,.35);word-break:break-all;margin:10px 0 16px}
#qrwrap{display:flex;justify-content:center}
#qrwrap canvas,#qrwrap img{border-radius:8px}

/* PARTICIPANTS GRILLE ATTENTE */
.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:4px}
.pcard{background:var(--subtle);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px}
.pcard.on{border-color:var(--orange);background:var(--orange-light)}
.pavatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.pname{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psess{font-size:10px;color:var(--muted)}

/* QUIZ LAYOUT */
.quiz-grid{display:grid;grid-template-columns:1fr 270px;gap:16px}
@media(max-width:680px){.quiz-grid{grid-template-columns:1fr}}

/* QUESTION */
.q-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.q-top{background:linear-gradient(135deg,var(--forest),#0c2118);padding:20px 24px}
.q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.q-num-lbl{font-size:12px;font-weight:700;color:rgba(255,255,255,.55)}
.q-prog-bar{flex:1;height:5px;background:rgba(255,255,255,.18);border-radius:3px;margin:0 12px;overflow:hidden}
.q-prog-fill{height:100%;background:var(--orange);border-radius:3px;transition:.4s}
.q-rep-count{font-size:12px;font-weight:700;color:rgba(255,255,255,.7)}
.q-texte{font-family:'Lora',serif;font-size:18px;font-weight:600;color:#fff;line-height:1.55}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px}
.opt{padding:12px 14px;border-radius:10px;border:2px solid var(--border);background:var(--subtle);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;transition:.2s}
.opt.ok{border-color:var(--green);background:var(--green-light);color:var(--green)}
.opt.ko{border-color:var(--rouge);background:var(--rouge-light);color:var(--rouge)}
.opt-let{width:24px;height:24px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;color:var(--text2)}
.opt.ok .opt-let{background:var(--green);color:#fff}
.opt.ko .opt-let{background:var(--rouge);color:#fff}
.expl-box{margin:0 16px 16px;padding:10px 14px;background:var(--gold-light);border-left:3px solid var(--gold);border-radius:8px;font-size:12px;color:var(--text2);line-height:1.6;display:none}
.q-btns{padding:0 16px 16px;display:flex;gap:8px}
.btn-action{flex:1;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--orange),#c4681e);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:.13s}
.btn-action:disabled{opacity:.4;cursor:not-allowed}
.btn-action.secondary{background:var(--green)}
.btn-stop{padding:13px 18px;border-radius:10px;border:none;background:var(--rouge);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* SIDEBAR */
.sidebar{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.sidebar-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-head strong{font-size:13px;font-weight:800}
.sidebar-body{padding:10px;max-height:520px;overflow-y:auto}
.prow{display:flex;align-items:center;gap:7px;padding:7px 6px;border-radius:8px;margin-bottom:3px;background:var(--subtle)}
.prow-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.prow-info{flex:1;min-width:0}
.prow-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow-score{font-size:10px;color:var(--muted)}
.prow-icon{font-size:16px;flex-shrink:0}

/* RÉSULTATS */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:20px 0 28px}
.pod-place{text-align:center;flex:1;max-width:150px}
.pod-bar{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:26px}
.pod-bar.p1{background:linear-gradient(180deg,#ffd700,#e8b800);height:110px}
.pod-bar.p2{background:linear-gradient(180deg,#c0c0c0,#a0a0a0);height:82px}
.pod-bar.p3{background:linear-gradient(180deg,#cd7f32,#a86a28);height:64px}
.pod-name{font-size:12px;font-weight:800;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod-score{font-size:11px;color:var(--muted)}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:6px;background:var(--subtle);border:1.5px solid var(--border)}
.rank-num{font-size:16px;min-width:30px;text-align:center}
.rank-info{flex:1}
.rank-pseudo{font-size:13px;font-weight:800}
.rank-detail{font-size:11px;color:var(--muted)}
.rank-pct{font-size:15px;font-weight:800}

/* TOGGLE RÉSULTATS PUBLICS */
.toggle-pub{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:9px;border:1.5px solid var(--border);background:var(--subtle);font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:14px;transition:.15s}
.toggle-pub.on{border-color:var(--green);background:var(--green-light);color:var(--green)}
.toggle-pub .dot{width:10px;height:10px;border-radius:50%;background:var(--muted);transition:.15s}
.toggle-pub.on .dot{background:var(--green)}

/* GROS BOUTON */
.btn-big{width:100%;padding:15px;border-radius:11px;border:none;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.15);transition:.13s}
.btn-big.orange{background:linear-gradient(135deg,var(--orange),#c4681e)}
.btn-big.forest{background:linear-gradient(135deg,var(--forest),#0c2118)}
.btn-big:disabled{opacity:.45;cursor:not-allowed}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.nb-badge{font-size:36px;font-weight:800;color:var(--orange);display:block;text-align:center;margin:6px 0 2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">🔥 Quiz en Salle</div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="pill" id="hdr-sess">—</span>
    <button class="btn-back" onclick="history.back()">← Retour</button>
  </div>
</div>

<!-- ═══ PHASE : CONFIG ═══ -->
<div class="phase on" id="ph-config">
<div class="wrap">
  <div class="card">
    <div class="card-head"><h2>⚙️ Configuration du quiz</h2></div>
    <div class="card-body">
      <div class="sec">
        <span class="sec-lbl">Type de quiz</span>
        <div class="tgl-g" id="tg-type">
          <button class="tgl on" data-v="debut_session">Début de session</button>
          <button class="tgl" data-v="fin_session">Fin de session</button>
          <button class="tgl" data-v="evaluation">Évaluation</button>
          <button class="tgl" data-v="recyclage">Recyclage</button>
        </div>
      </div>
      <div class="sec">
        <span class="sec-lbl">Nombre de questions</span>
        <div class="tgl-g" id="tg-nb">
          <button class="tgl" data-v="5">5</button>
          <button class="tgl on" data-v="10">10</button>
          <button class="tgl" data-v="15">15</button>
          <button class="tgl" data-v="20">20</button>
        </div>
      </div>
      <div class="sec">
        <span class="sec-lbl">Thématique</span>
        <div class="tgl-g" id="tg-partie">
          <button class="tgl on" data-v="toutes">✨ Toutes les parties</button>
        </div>
      </div>
      <button class="btn-big orange" id="btn-gen" onclick="genererSalle()">🎮 Générer le code de salle</button>
    </div>
  </div>
</div>
</div>

<!-- ═══ PHASE : ATTENTE ═══ -->
<div class="phase" id="ph-attente">
<div class="wrap">
  <div class="code-banner">
    <div class="code-lbl">Affichez ce code sur votre écran</div>
    <div class="code-num" id="code-disp">— — —</div>
    <div class="code-url-txt" id="code-url"></div>
    <div id="qrwrap"></div>
  </div>
  <div class="card">
    <div class="card-head">
      <h2>👥 Participants connectés</h2>
      <span class="nb-badge" id="nb-parts">0</span>
    </div>
    <div class="card-body">
      <div class="parts-grid" id="parts-grid">
        <div style="color:var(--muted);font-size:13px;grid-column:1/-1;text-align:center;padding:24px">
          En attente que les stagiaires scannent le QR code…
        </div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn-big orange" style="flex:1" id="btn-start" onclick="demarrer()">▶ Démarrer le quiz</button>
    <button onclick="annuler()" style="padding:15px 20px;border-radius:11px;border:none;background:var(--rouge);color:#fff;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px">✕ Annuler</button>
  </div>
</div>
</div>

<!-- ═══ PHASE : QUIZ ACTIF ═══ -->
<div class="phase" id="ph-quiz">
<div class="wrap">
  <div class="quiz-grid">
    <!-- Question -->
    <div>
      <div class="q-card">
        <div class="q-top">
          <div class="q-meta">
            <span class="q-num-lbl">Question <span id="q-idx">1</span> / <span id="q-tot">?</span></span>
            <div class="q-prog-bar"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-rep-count" id="q-rep-lbl">0 réponse</span>
          </div>
          <div class="q-texte" id="q-text">Chargement…</div>
        </div>
        <div class="opts-grid" id="opts-wrap"></div>
        <div class="expl-box" id="expl-box"></div>
        <div class="q-btns">
          <button class="btn-action" id="btn-show" onclick="showReponses()">👁 Afficher les réponses</button>
          <button class="btn-action secondary" id="btn-next" onclick="suivante()" style="display:none">Question suivante →</button>
          <button class="btn-stop" onclick="terminer(false)">⏹</button>
        </div>
      </div>
    </div>
    <!-- Sidebar -->
    <div>
      <div class="sidebar">
        <div class="sidebar-head">
          <strong>📋 Participants</strong>
          <span style="font-size:11px;color:var(--muted)" id="sb-count"></span>
        </div>
        <div class="sidebar-body" id="sb-list"></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ═══ PHASE : RÉSULTATS ═══ -->
<div class="phase" id="ph-results">
<div class="wrap">
  <div class="card">
    <div class="card-head"><h2>🏆 Résultats finaux</h2></div>
    <div class="card-body">
      <div class="podium" id="podium"></div>
      <button class="toggle-pub on" id="btn-pub" onclick="togglePub()">
        <div class="dot"></div>
        <span id="pub-lbl">Résultats visibles par les stagiaires</span>
      </button>
      <div id="classement"></div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn-big forest" style="flex:1" onclick="nouveauQuiz()">🔄 Nouveau quiz</button>
        <button class="btn-big orange" style="flex:1" onclick="history.back()">← Retour dashboard</button>
      </div>
    </div>
  </div>
</div>
</div>

<script>
var API   = 'https://ssiap-training-center.onrender.com/api';
var BASE  = 'https://ssiap-training-center.onrender.com';
var p     = new URLSearchParams(window.location.search);
var centerId    = p.get('centerId')    || '';
var sessionId   = p.get('sessionId')   || '';
var niveau      = p.get('niveau')      || '1';
var sessionNom  = decodeURIComponent(p.get('sessionNom') || '');
var formateurId = p.get('formateurId') || '';

document.getElementById('hdr-sess').textContent = sessionNom || 'Session';

var code        = null;
var poll        = null;
var quests      = [];
var parts       = {};
var curQ        = 0;
var pubVisible  = true;
var cfg = { type:'debut_session', nb:10, partie:'toutes' };

// ── TOGGLES ──
function mkToggle(groupId, setter) {
  document.getElementById(groupId).querySelectorAll('.tgl').forEach(function(b) {
    b.onclick = function() {
      document.getElementById(groupId).querySelectorAll('.tgl').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');
      setter(b.dataset.v);
    };
  });
}
mkToggle('tg-type',   function(v){ cfg.type   = v; });
mkToggle('tg-nb',     function(v){ cfg.nb     = parseInt(v); });
mkToggle('tg-partie', function(v){ cfg.partie = v; });

// Charger parties dynamiquement
(async function(){
  try {
    var r = await fetch(API+'/entrainement/config/'+niveau);
    var d = await r.json();
    if (!d.success || !d.config.parties) return;
    var wrap = document.getElementById('tg-partie');
    wrap.innerHTML = '<button class="tgl on" data-v="toutes">✨ Toutes les parties</button>';
    d.config.parties.forEach(function(pp){
      var b = document.createElement('button');
      var nomsParties = {
        '1': {
          'partie1':'Le feu et ses conséquences',
          'partie2':'Sécurité incendie',
          'partie3':'Installations techniques',
          'partie4':'Rôle et missions des agents de sécurité incendie',
          'partie5':'Concrétisation des acquis'
        },
        '2': {
          'partie1':"Rôles et missions du chef d'équipe",
          'partie2':'Manipulation du système de sécurité incendie',
          'partie3':'Hygiène et sécurité en matière de sécurité incendie',
          'partie4':'Chef du poste central de sécurité en situation de crise'
        },
        '3': {
          'partie1':'Le feu et ses conséquences',
          'partie2':'La sécurité incendie et les bâtiments',
          'partie3':'La réglementation incendie',
          'partie4':'Gestion des risques',
          'partie5':"Conseil au chef d'établissement",
          'partie6':'Correspondant des commissions de sécurité',
          'partie7':"Le management de l'équipe de sécurité",
          'partie8':'Le budget du service sécurité'
        }
      };
      var niveauMap = nomsParties[String(niveau)] || {};
      b.className='tgl'; b.dataset.v=pp.id; b.textContent=pp.nom||pp.label||(niveauMap[pp.id])||pp.id;
      wrap.appendChild(b);
    });
    mkToggle('tg-partie', function(v){ cfg.partie=v; });
  } catch(e){}
})();

// ── GÉNÉRER SALLE ──
async function genererSalle() {
  var btn = document.getElementById('btn-gen');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Génération…';
  try {
    var r = await post('/quiz/creer-salle', {
      centerId, formateurId, sessionId,
      sessionsIncluded: sessionId?[sessionId]:[],
      niveau, type:cfg.type, nbQuestions:cfg.nb, partieId:cfg.partie
    });
    if (!r.success) throw new Error(r.error||'Erreur');
    code = r.code;
    show('ph-attente');
    var fmt = code.slice(0,3)+'-'+code.slice(3);
    document.getElementById('code-disp').textContent = fmt;
    var url = BASE+'/stagiaire/rejoindre-quiz.html?code='+code+'&centerId='+encodeURIComponent(centerId);
    document.getElementById('code-url').textContent = url;
    document.getElementById('qrwrap').innerHTML = '';
    new QRCode(document.getElementById('qrwrap'),{text:url,width:150,height:150,colorDark:'#1a4a32',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    startPoll();
  } catch(e) {
    alert('Erreur : '+e.message);
    btn.disabled=false; btn.innerHTML='🎮 Générer le code de salle';
  }
}

// ── POLLING ──
function startPoll(){ if(poll)clearInterval(poll); poll=setInterval(doPoll,2000); doPoll(); }

async function doPoll() {
  if (!code) return;
  try {
    var d = await get('/quiz/statut/'+code+'?centerId='+encodeURIComponent(centerId));
    if (!d.success) return;
    parts = d.participants||{};

    if (d.phase==='attente') {
      renderPartsAttente();
    } else if (d.phase==='actif') {
      if (!document.getElementById('ph-quiz').classList.contains('on')) {
        show('ph-quiz');
      }
      curQ   = d.currentQuestion||0;
      // Charger la question depuis le statut (questionCourante) si on n'a pas encore la liste
      if (d.questionCourante && (!quests[curQ] || quests[curQ].id !== d.questionCourante.id)) {
        quests[curQ] = d.questionCourante;
        quests.length = d.totalQuestions;
        renderQuestion(curQ, d.showResults);
      } else if (!document.getElementById('q-text').textContent || document.getElementById('q-text').textContent==='Chargement…') {
        if (d.questionCourante) { quests[curQ]=d.questionCourante; renderQuestion(curQ, d.showResults); }
      }
      renderSidebar(curQ, d.showResults);
      if (d.showResults) applyShowResults(curQ);
    } else if (d.phase==='termine'||d.phase==='annule') {
      clearInterval(poll);
    }
  } catch(e){}
}

// ── RENDER ATTENTE ──
function renderPartsAttente() {
  var list = Object.values(parts);
  document.getElementById('nb-parts').textContent = list.length;
  var g = document.getElementById('parts-grid');
  if (!list.length) {
    g.innerHTML='<div style="color:var(--muted);font-size:13px;grid-column:1/-1;text-align:center;padding:24px">En attente…</div>';
    return;
  }
  g.innerHTML = list.map(function(pp){
    var init=(pp.pseudo||'?')[0].toUpperCase();
    return '<div class="pcard on"><div class="pavatar" style="background:var(--orange);color:#fff">'+init+'</div>'+
    '<div><div class="pname">'+(pp.pseudo||'—')+'</div><div class="psess">'+(pp.mode==='equipe'?'👥':'🧑')+' '+(pp.sessionNom||'')+'</div></div></div>';
  }).join('');
}

// ── DÉMARRER ──
async function demarrer() {
  var btn=document.getElementById('btn-start');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Démarrage…';
  try {
    var r = await post('/quiz/lancer/'+code,{centerId});
    if (!r.success) throw new Error(r.error||'Erreur');
    // Les questions seront récupérées via le poll (questionCourante)
    show('ph-quiz');
    document.getElementById('q-tot').textContent = r.nbQuestions;
    doPoll();
  } catch(e) {
    alert('Erreur : '+e.message);
    btn.disabled=false; btn.innerHTML='▶ Démarrer le quiz';
  }
}

// ── RENDER QUESTION ──
function renderQuestion(idx, showRes) {
  var q = quests[idx];
  if (!q) return;
  document.getElementById('q-idx').textContent = idx+1;
  document.getElementById('q-text').textContent = q.question||q.texte||'';
  document.getElementById('expl-box').style.display='none';
  document.getElementById('btn-show').style.display='inline-flex';
  document.getElementById('btn-next').style.display='none';

  var lets=['A','B','C','D','E'];
  document.getElementById('opts-wrap').innerHTML=(q.options||[]).map(function(o,i){
    return '<div class="opt" id="opt-'+i+'"><div class="opt-let">'+lets[i]+'</div><div style="flex:1;line-height:1.4">'+o+'</div></div>';
  }).join('');

  if (showRes) applyShowResults(idx);
}

function applyShowResults(idx) {
  var q = quests[idx];
  if (!q) return;
  var corr = (q.correctAnswers||[0]).map(Number);
  (q.options||[]).forEach(function(_,i){
    var el=document.getElementById('opt-'+i);
    if (!el) return;
    el.className = 'opt '+(corr.includes(i)?'ok':'ko');
  });
  if (q.explanation) {
    var ex=document.getElementById('expl-box');
    ex.innerHTML='<strong>💡</strong> '+q.explanation;
    ex.style.display='block';
  }
  document.getElementById('btn-show').style.display='none';
  var nxt = document.getElementById('btn-next');
  nxt.style.display='inline-flex';
  nxt.disabled=false;  // Toujours réactiver
}

// ── SIDEBAR ──
function renderSidebar(qIdx, showRes) {
  var list=Object.entries(parts);
  var nbRep=list.filter(function(e){ return e[1].reponses&&e[1].reponses[qIdx]; }).length;
  var nbTot=list.length;
  document.getElementById('q-rep-lbl').textContent=nbRep+'/'+nbTot+' réponse'+(nbRep>1?'s':'');
  document.getElementById('q-prog').style.width=(nbTot>0?Math.round(nbRep/nbTot*100):0)+'%';
  document.getElementById('sb-count').textContent=nbRep+'/'+nbTot;
  document.getElementById('sb-list').innerHTML=list.map(function(e){
    var pid=e[0],pp=e[1];
    var rep=pp.reponses&&pp.reponses[qIdx];
    var icon=rep?(rep.isCorrect?'✅':'❌'):'⏳';
    var init=(pp.pseudo||'?')[0].toUpperCase();
    return '<div class="prow">'+
      '<div class="prow-av" style="background:var(--forest);color:#fff">'+init+'</div>'+
      '<div class="prow-info"><div class="prow-name">'+(pp.pseudo||'—')+'</div>'+
      '<div class="prow-score">'+(pp.score||0)+'pt</div></div>'+
      '<div class="prow-icon">'+icon+'</div></div>';
  }).join('');
}

// ── AFFICHER RÉPONSES ──
async function showReponses() {
  document.getElementById('btn-show').disabled=true;
  try { await post('/quiz/afficher-resultats/'+code,{centerId}); } catch(e){}
  applyShowResults(curQ);
}

// ── QUESTION SUIVANTE ──
async function suivante() {
  document.getElementById('btn-next').disabled=true;
  try {
    var r = await post('/quiz/question-suivante/'+code,{centerId});
    if (!r.success) { document.getElementById('btn-next').disabled=false; return; }
    if (r.termine) {
      clearInterval(poll);
      renderResultatsFinaux(r.classement, r.totalQuestions||quests.length);
    } else {
      curQ = r.currentQuestion;
      // La question sera chargée via le prochain poll
      document.getElementById('q-text').textContent='Chargement…';
      document.getElementById('opts-wrap').innerHTML='';
      document.getElementById('expl-box').style.display='none';
      document.getElementById('btn-show').style.display='inline-flex';
      document.getElementById('btn-show').disabled=false;
      document.getElementById('btn-next').style.display='none';
      doPoll();
    }
  } catch(e){}
  document.getElementById('btn-next').disabled=false;
}

// ── TERMINER / ANNULER ──
async function terminer(isAnnule) {
  if (!confirm(isAnnule?'Annuler le quiz ?':'Terminer le quiz maintenant ?')) return;
  clearInterval(poll);
  try {
    var r = await post('/quiz/terminer/'+code,{centerId,annule:isAnnule});
    if (r.resultats) renderResultatsFinaux(r.resultats, quests.length);
    else history.back();
  } catch(e){ history.back(); }
}
function annuler(){ terminer(true); }

// ── RÉSULTATS FINAUX ──
function renderResultatsFinaux(classement, nbQ) {
  show('ph-results');
  var sorted=(classement||[]).slice().sort(function(a,b){return b.score-a.score||a.tempsTotal-b.tempsTotal;});
  nbQ = nbQ||quests.length||1;

  // Podium [2e, 1er, 3e]
  var order=[1,0,2], bars=['p2','p1','p3'], medals=['🥈','🥇','🥉'];
  var podHtml='';
  order.forEach(function(rank,col){
    var pp=sorted[rank];
    if(!pp){podHtml+='<div class="pod-place"></div>';return;}
    podHtml+='<div class="pod-place">'+
      '<div class="pod-bar '+bars[col]+'">'+medals[col]+'</div>'+
      '<div class="pod-name">'+(pp.pseudo||'—')+'</div>'+
      '<div class="pod-score">'+pp.score+'/'+nbQ+' · '+fmtT(pp.tempsTotal)+'</div>'+
    '</div>';
  });
  document.getElementById('podium').innerHTML=podHtml;

  // Liste classement
  var m2=['🥇','🥈','🥉'];
  document.getElementById('classement').innerHTML=sorted.map(function(pp,i){
    var pct=Math.round((pp.score/nbQ)*100);
    var col=pct>=70?'var(--green)':pct>=50?'var(--gold)':'var(--rouge)';
    return '<div class="rank-row">'+
      '<div class="rank-num">'+(m2[i]||'#'+(i+1))+'</div>'+
      '<div class="rank-info"><div class="rank-pseudo">'+(pp.pseudo||'—')+'</div>'+
      '<div class="rank-detail">'+(pp.mode==='equipe'?'👥':'🧑')+' · '+fmtT(pp.tempsTotal)+'</div></div>'+
      '<div class="rank-pct" style="color:'+col+'">'+pct+'%</div>'+
    '</div>';
  }).join('');
}

// ── TOGGLE RÉSULTATS PUBLICS ──
function togglePub() {
  pubVisible = !pubVisible;
  document.getElementById('btn-pub').className='toggle-pub'+(pubVisible?' on':'');
  document.getElementById('pub-lbl').textContent=pubVisible?'Résultats visibles par les stagiaires':'Résultats masqués';
  // Persister en Firebase via endpoint (non bloquant)
  post('/quiz/'+(pubVisible?'afficher':'masquer')+'-resultats/'+code,{centerId}).catch(function(){});
}

// ── HELPERS ──
function show(id){
  ['ph-config','ph-attente','ph-quiz','ph-results'].forEach(function(i){document.getElementById(i).classList.remove('on');});
  document.getElementById(id).classList.add('on');
}
async function post(path, body) {
  var r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.headers.get('content-type')?.includes('json')) throw new Error('Endpoint introuvable ('+r.status+')');
  return r.json();
}
async function get(path) {
  var r=await fetch(API+path);
  return r.json();
}
function fmtT(ms) {
  if(!ms)return'—';
  var s=Math.round(ms/1000);
  return s>=60?Math.floor(s/60)+'min'+(s%60?''+s%60+'s':''):s+'s';
}
function nouveauQuiz(){
  window.location.href=window.location.pathname+'?centerId='+encodeURIComponent(centerId)+'&sessionId='+encodeURIComponent(sessionId)+'&niveau='+niveau+'&sessionNom='+encodeURIComponent(sessionNom)+'&formateurId='+encodeURIComponent(formateurId);
}
