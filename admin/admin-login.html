<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSIAP Admin — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --terra:#c25a3a;--terra-d:#a34a2e;
  --bg:#f7f4f0;--surface:#ffffff;--border:#e8e2db; 
  --text:#1e1a17;--muted:#8c8078;--subtle:#f0ece7;
  --green:#2e7d52;--red:#c0392b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}

/* Fond décoratif */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 800px 600px at 10% 20%, rgba(194,90,58,.07) 0%, transparent 60%),
    radial-gradient(ellipse 600px 400px at 90% 80%, rgba(46,92,138,.06) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

.card{
  position:relative;z-index:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:48px 40px;
  width:100%;max-width:400px;
  box-shadow:0 8px 48px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);
}

.logo{text-align:center;margin-bottom:36px}
.logo .flame{font-size:40px;line-height:1;display:block;margin-bottom:10px}
.logo h1{
  font-family:'Lora',serif;font-size:22px;font-weight:700;
  color:var(--text);line-height:1.2;
}
.logo h1 span{color:var(--terra)}
.logo small{
  display:block;margin-top:6px;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--muted);letter-spacing:2px;text-transform:uppercase;
}

.label{
  display:block;font-size:11px;font-weight:700;
  color:var(--muted);letter-spacing:.5px;margin-bottom:7px;
}
.field{margin-bottom:18px}
.input{
  width:100%;padding:13px 16px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--subtle);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);
  transition:.15s;outline:none;
}
.input:focus{border-color:var(--terra);background:#fff;box-shadow:0 0 0 3px rgba(194,90,58,.1)}
.input::placeholder{color:var(--muted)}

.btn-login{
  width:100%;padding:15px;margin-top:8px;
  border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--terra),var(--terra-d));
  color:#fff;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;font-weight:800;cursor:pointer;
  transition:.15s;letter-spacing:.3px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(194,90,58,.3)}
.btn-login:active{transform:none}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}

.error-box{
  margin-top:16px;padding:12px 14px;
  background:#fdecea;border:1.5px solid rgba(192,57,43,.2);border-radius:9px;
  color:var(--red);font-size:13px;font-weight:600;
  display:none;align-items:center;gap:8px;
}
.error-box.show{display:flex}

.spinner{
  width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

.footer-note{
  text-align:center;margin-top:24px;
  font-size:11px;color:var(--muted);
  font-family:'DM Mono',monospace;letter-spacing:.5px;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="flame">🔥</span>
    <h1>SSIAP <span>Training</span></h1>
    <small>Administration</small>
  </div>

  <div class="field">
    <label class="label" for="inp-email">Adresse e-mail</label>
    <input class="input" id="inp-email" type="email" placeholder="admin@exemple.fr" autocomplete="email">
  </div>

  <div class="field">
    <label class="label" for="inp-pw">Mot de passe</label>
    <input class="input" id="inp-pw" type="password" placeholder="••••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="btn-login" onclick="doLogin()">
    <span id="btn-text">Connexion</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="error-box" id="error-box">
    <span>⚠️</span>
    <span id="error-msg">Identifiants incorrects</span>
  </div>

  <p class="footer-note">Accès réservé · Administrateur plateforme</p>
</div>

<script>
var API = 'https://ssiap-training-center.onrender.com/api';

// Rediriger si déjà connecté
(function() {
    var token = sessionStorage.getItem('adminToken');
    if (token) {
        var dest = new URLSearchParams(window.location.search).get('redirect') || '../admin/admin-dashboard.html';
        window.location = dest;
    }
})();

document.getElementById('inp-pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});
document.getElementById('inp-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('inp-pw').focus();
});

async function doLogin() {
    var email = document.getElementById('inp-email').value.trim();
    var pw    = document.getElementById('inp-pw').value;
    var btn   = document.getElementById('btn-login');
    var spinner = document.getElementById('spinner');
    var errBox  = document.getElementById('error-box');
    var errMsg  = document.getElementById('error-msg');

    if (!email || !pw) {
        showError('Veuillez remplir tous les champs');
        return;
    }

    // État chargement
    btn.disabled = true;
    document.getElementById('btn-text').textContent = 'Connexion…';
    spinner.style.display = 'block';
    errBox.classList.remove('show');

    try {
        var r = await fetch(API + '/admin/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password: pw })
        });
        var d = await r.json();

        if (d.success && d.token) {
            sessionStorage.setItem('adminToken', d.token);
            var dest = new URLSearchParams(window.location.search).get('redirect') || 'admin-dashboard.html';
            window.location = dest;
        } else {
            showError(d.error || 'Identifiants incorrects');
        }
    } catch(e) {
        showError('Erreur de connexion au serveur');
    } finally {
        btn.disabled = false;
        document.getElementById('btn-text').textContent = 'Connexion';
        spinner.style.display = 'none';
    }
}

function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-box').classList.add('show');
    document.getElementById('inp-pw').value = '';
    document.getElementById('inp-pw').focus();
}
</script>
</body>
</html>
