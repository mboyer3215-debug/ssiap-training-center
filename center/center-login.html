<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Centre — SSIAP Training</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--terra:#c25a3a;--terra-d:#a34a2e;--terra-bg:#fdf0eb;--bg:#f7f4f0;--surface:#fff;--border:#e8e2db;--text:#1e1a17;--muted:#8c8078;--subtle:#f0ece7;--green:#2e7d52;--green-bg:#e8f5ee;--red:#c0392b;--red-bg:#fdecea}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:grid;grid-template-columns:1fr 1fr}

/* ── GAUCHE déco ── */
.left{background:var(--terra);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 48px;position:relative;overflow:hidden}
.left::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,.06);top:-100px;right:-100px}
.left::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.04);bottom:-80px;left:-80px}
.left-logo{font-size:56px;margin-bottom:24px;position:relative;z-index:1}
.left-title{font-family:'Lora',serif;font-size:32px;font-weight:700;color:#fff;text-align:center;margin-bottom:12px;position:relative;z-index:1}
.left-sub{font-size:14px;color:rgba(255,255,255,.75);text-align:center;line-height:1.6;position:relative;z-index:1;max-width:280px}
.left-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:32px;justify-content:center;position:relative;z-index:1}
.chip{background:rgba(255,255,255,.15);color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.2)}

/* ── DROITE form ── */
.right{display:flex;align-items:center;justify-content:center;padding:48px 40px}
.form-box{width:100%;max-width:400px}
.form-header{margin-bottom:32px}
.form-title{font-family:'Lora',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px}
.form-sub{font-size:13px;color:var(--muted)}

.form-group{margin-bottom:18px}
.form-label{display:block;margin-bottom:6px;font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.6px}
.form-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:.15s}
.form-input:focus{border-color:var(--terra);box-shadow:0 0 0 3px var(--terra-bg)}
.form-input.error{border-color:var(--red)}
.form-input::placeholder{color:var(--muted)}

.forgot-link{display:block;text-align:right;font-size:11px;color:var(--terra);font-weight:600;text-decoration:none;margin-top:6px}
.forgot-link:hover{text-decoration:underline}

.btn{width:100%;padding:14px;border-radius:10px;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;margin-bottom:12px}
.btn-primary{background:var(--terra);color:#fff}
.btn-primary:hover{background:var(--terra-d)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-register{background:var(--subtle);color:var(--text);border:1.5px solid var(--border)}
.btn-register:hover{border-color:var(--terra);color:var(--terra)}

.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.alert{padding:12px 16px;border-radius:8px;font-size:12px;margin-bottom:16px;display:none;line-height:1.5}
.alert.show{display:flex;align-items:flex-start;gap:8px}
.alert.error{background:var(--red-bg);border:1px solid rgba(192,57,43,.2);color:var(--red)}
.alert.success{background:var(--green-bg);border:1px solid rgba(46,125,82,.2);color:var(--green)}

.footer-links{margin-top:24px;text-align:center;font-size:11px;color:var(--muted)}
.footer-links a{color:var(--terra);font-weight:600;text-decoration:none;margin:0 6px}
.footer-links a:hover{text-decoration:underline}

/* Responsive */
@media(max-width:768px){
  body{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .left{padding:32px 24px}
  .left-title{font-size:22px}
  .left-chips{display:none}
  .right{padding:32px 24px}
}
</style>
</head>
<body>

<!-- ── GAUCHE ── -->
<div class="left">
  <div class="left-logo">🔥</div>
  <div class="left-title">SSIAP Training</div>
  <div class="left-sub">Plateforme de préparation aux certifications SSIAP niveaux 1, 2 et 3</div>
  <div class="left-chips">
    <span class="chip">📋 SSIAP 1</span>
    <span class="chip">👔 SSIAP 2</span>
    <span class="chip">🏛️ SSIAP 3</span>
    <span class="chip">📊 Suivi stagiaires</span>
    <span class="chip">🎯 Quiz interactifs</span>
    <span class="chip">📈 Statistiques</span>
  </div>
</div>

<!-- ── DROITE ── -->
<div class="right">
  <div class="form-box">
    <div class="form-header">
      <div class="form-title">Espace Centre 🏢</div>
      <div class="form-sub">Connectez-vous à votre tableau de bord de gestion</div>
    </div>

    <div class="alert" id="alert"></div>

    <div class="form-group">
      <label class="form-label">Email de connexion</label>
      <input type="email" class="form-input" id="email" placeholder="contact@mon-centre.fr" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') login()">
      <a href="center-reset-password.html" class="forgot-link">Mot de passe oublié ?</a>
    </div>

    <button class="btn btn-primary" id="btn-login" onclick="login()">
      Se connecter →
    </button>

    <div class="divider">ou</div>

    <button class="btn btn-register" onclick="window.location='center-register.html'">
      🎫 Activer ma clé de licence (première connexion)
    </button>

    <div class="footer-links">
      <a href="../index.html">← Accueil</a>
      <a href="center-register.html">Créer un compte</a>
    </div>
  </div>
</div>

<script>
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:10000/api'
  : 'https://ssiap-training-center.onrender.com/api';

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');

  if (!email || !password) {
    showAlert('error', '⚠️ Email et mot de passe requis');
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Connexion…';

  try {
    const r = await fetch(`${API}/center/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();

    if (data.success) {
      localStorage.setItem('ssiap_token', data.centerId);
      localStorage.setItem('ssiap_center', JSON.stringify({
        centerId:  data.centerId,
        nom:       data.nom,
        email:     data.email,
        license: {
          type:          data.license?.type || 'DEMO',
          expiresAt:     data.license?.expiresAt || null,
          maxFormateurs: data.license?.maxFormateurs || 1,
          maxStagiaires: data.license?.maxStagiaires || 10
        }
      }));
      showAlert('success', `✅ Bienvenue ${data.nom} !`);
      setTimeout(() => window.location = 'center-dashboard.html', 800);
    } else {
      showAlert('error', '❌ ' + (data.error || 'Email ou mot de passe incorrect'));
    }
  } catch (err) {
    showAlert('error', '⚠️ Serveur inaccessible. Vérifiez votre connexion.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Se connecter →';
  }
}

function showAlert(type, msg) {
  const el = document.getElementById('alert');
  el.innerHTML = msg;
  el.className = `alert ${type} show`;
}
</script>
</body>
</html>
